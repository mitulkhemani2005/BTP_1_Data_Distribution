<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FL Data Distribution — DS1 / DS2 / DS3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 24px;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    color: #f1f5f9;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .subtitle {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 20px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .tab {
    padding: 7px 18px;
    border-radius: 8px;
    border: 1px solid #2d3748;
    background: transparent;
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .tab.active {
    background: #1e293b;
    color: #f1f5f9;
    border-color: #475569;
    font-weight: 500;
  }
  .tab:hover:not(.active) { border-color: #3d4f65; color: #cbd5e1; }

  .desc-box {
    background: #1a2235;
    border: 1px solid #2d3748;
    border-left: 3px solid #3b82f6;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 20px;
    line-height: 1.6;
    min-height: 44px;
    transition: opacity 0.2s;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: #475569;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  #pool-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 8px;
  }
  .pool-row { display: flex; gap: 4px; }
  .tile {
    width: 32px;
    height: 32px;
    border-radius: 5px;
    cursor: default;
    transition: opacity 0.3s, transform 0.2s;
    position: relative;
    flex-shrink: 0;
  }
  .tile:hover { transform: scale(1.1); }
  .tile.dimmed { opacity: 0.12; }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: #64748b;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 20px;
  }
  .btn-primary {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid #3b82f6;
    background: #1d4ed8;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #2d3748;
    background: transparent;
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: #475569; color: #cbd5e1; }

  #status {
    font-size: 12px;
    color: #22d3ee;
    margin-left: 4px;
  }

  .clients-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .client-box {
    background: #131929;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 14px;
    min-height: 200px;
    position: relative;
    transition: border-color 0.3s;
  }
  .client-box.highlight {
    border-color: #334155;
    box-shadow: 0 0 0 1px #1e3a5f;
  }
  .client-title {
    font-size: 13px;
    font-weight: 500;
    color: #e2e8f0;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .client-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: #1e293b;
    color: #64748b;
    font-weight: 400;
  }
  .client-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 150px;
    font-size: 12px;
    color: #334155;
    flex-direction: column;
    gap: 6px;
  }
  .wait-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px dashed #334155;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }
  .bar-label { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .bar-track {
    flex: 1;
    height: 10px;
    background: #1e293b;
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    width: 0;
    transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .bar-count {
    font-size: 11px;
    color: #475569;
    min-width: 18px;
    text-align: right;
  }
  .mini-tiles {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #1e293b;
  }
  .mini-tile {
    width: 9px;
    height: 9px;
    border-radius: 2px;
    opacity: 0;
    transform: scale(0.5);
    animation: popIn 0.2s forwards;
  }
  @keyframes popIn {
    to { opacity: 1; transform: scale(1); }
  }
  .total-count {
    font-size: 11px;
    color: #475569;
    margin-top: 8px;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 100;
  }

  .ds-highlight {
    display: inline-block;
    background: #1e3a5f;
    color: #93c5fd;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12px;
    font-weight: 500;
  }
</style>
</head>
<body>

<h1>Federated learning — data distribution scenarios</h1>
<div class="subtitle">6 classes · 10 images each · 3 clients</div>

<div class="tabs">
  <button class="tab active" id="tab-1" onclick="setScenario(1)">DS1 — balanced</button>
  <button class="tab" id="tab-2" onclick="setScenario(2)">DS2 — skewed</button>
  <button class="tab" id="tab-3" onclick="setScenario(3)">DS3 — exclusive</button>
</div>

<div class="desc-box" id="desc-box"></div>

<div class="section-label">Dataset pool</div>
<div id="pool-grid"></div>
<div class="legend" id="legend"></div>

<div class="controls">
  <button class="btn-primary" id="play-btn" onclick="distribute()">Distribute data ↓</button>
  <button class="btn-secondary" onclick="reset()">Reset</button>
  <span id="status"></span>
</div>

<div class="clients-grid">
  <div class="client-box" id="client-0"></div>
  <div class="client-box" id="client-1"></div>
  <div class="client-box" id="client-2"></div>
</div>

<canvas id="anim-canvas"></canvas>

<script>
const COLORS = ['#e05c30','#19a87a','#3f8fe0','#e09a20','#8075e0','#5aab22'];
const DARK_COLORS = ['#f87a52','#34d9a5','#60a5fa','#fbbf24','#a78bfa','#86efac'];
const CLASS_NAMES = ['Class A','Class B','Class C','Class D','Class E','Class F'];

let currentScenario = 1;
let animating = false;
let particles = [];
let animId = null;
let tileEls = [];

const DESCRIPTIONS = {
  1: `<strong>DS1 — balanced IID:</strong> Data for each class is evenly distributed among all 3 clients. Each client receives roughly equal proportions from every class, resulting in the <em>lowest heterogeneity</em>. Round-robin assignment: tile 0 → Client 1, tile 1 → Client 2, tile 2 → Client 3, tile 3 → Client 1 … (Client 1 gets 4 tiles/class, others get 3).`,
  2: `<strong>DS2 — skewed non-IID:</strong> Each client receives <strong>80% of images</strong> from 2 primary classes and <strong>20%</strong> from the remaining classes. Client 1 → primary classes A & B, Client 2 → primary C & D, Client 3 → primary E & F. Moderate data heterogeneity.`,
  3: `<strong>DS3 — exclusive non-IID:</strong> Each client is assigned data <strong>exclusively from 2 classes</strong> with no overlap between clients. Client 1 → classes A & B only, Client 2 → C & D only, Client 3 → E & F only. Maximum heterogeneity.`
};

function getAssignment(scenario, classId, tileIdx) {
  if (scenario === 1) {
    return tileIdx % 3;
  } else if (scenario === 2) {
    const primary = Math.floor(classId / 2);
    if (tileIdx < 8) return primary;
    const others = [0,1,2].filter(c => c !== primary);
    return others[tileIdx - 8];
  } else {
    return Math.floor(classId / 2);
  }
}

function initPool() {
  const grid = document.getElementById('pool-grid');
  grid.innerHTML = '';
  tileEls = [];
  for (let c = 0; c < 6; c++) {
    const row = document.createElement('div');
    row.className = 'pool-row';
    for (let i = 0; i < 10; i++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${c}-${i}`;
      tile.style.background = COLORS[c];
      tile.title = `${CLASS_NAMES[c]} — image ${i+1}`;
      row.appendChild(tile);
      tileEls.push({ el: tile, c, i });
    }
    grid.appendChild(row);
  }
}

function initLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = CLASS_NAMES.map((name, i) =>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${COLORS[i]}"></div>
      ${name}
    </div>`
  ).join('');
}

function initClients() {
  for (let cli = 0; cli < 3; cli++) {
    const box = document.getElementById(`client-${cli}`);
    box.classList.remove('highlight');
    box.innerHTML = `
      <div class="client-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Client ${cli+1}
        <span class="client-badge">idle</span>
      </div>
      <div class="client-empty">
        <div class="wait-icon">…</div>
        waiting for data
      </div>`;
  }
}

function setScenario(n) {
  currentScenario = n;
  [1,2,3].forEach(id => {
    document.getElementById(`tab-${id}`).className = `tab${n === id ? ' active' : ''}`;
  });
  document.getElementById('desc-box').innerHTML = DESCRIPTIONS[n];
  reset(false);
}

function reset(full = true) {
  if (animId) cancelAnimationFrame(animId);
  particles = [];
  animating = false;
  const canvas = document.getElementById('anim-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  tileEls.forEach(({ el }) => el.classList.remove('dimmed'));
  initClients();
  const pb = document.getElementById('play-btn');
  pb.disabled = false;
  pb.textContent = 'Distribute data ↓';
  document.getElementById('status').textContent = '';
  if (full) initPool();
}

function distribute() {
  if (animating) return;
  animating = true;
  document.getElementById('play-btn').disabled = true;
  document.getElementById('status').textContent = 'distributing…';

  const canvas = document.getElementById('anim-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const clientEls = [0,1,2].map(i => document.getElementById(`client-${i}`));
  const clientRects = clientEls.map(el => el.getBoundingClientRect());

  const totalTiles = 60;
  particles = [];

  tileEls.forEach(({ el, c, i }, idx) => {
    const tr = el.getBoundingClientRect();
    const clientId = getAssignment(currentScenario, c, i);
    const cr = clientRects[clientId];
    const spread = 60;
    const jx = (Math.random() - 0.5) * spread;
    const jy = (Math.random() - 0.5) * 20 + 30;

    particles.push({
      sx: tr.left + tr.width / 2,
      sy: tr.top + tr.height / 2,
      tx: cr.left + cr.width / 2 + jx,
      ty: cr.top + jy,
      color: COLORS[c],
      dark: DARK_COLORS[c],
      classId: c,
      clientId,
      delay: idx * 18,
      duration: 650,
      done: false,
    });
  });

  tileEls.forEach(({ el }) => el.classList.add('dimmed'));

  const startTime = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
  function easeInOut(t) { return t < 0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }

  function animLoop(now) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let allDone = true;
    particles.forEach(p => {
      const elapsed = now - startTime - p.delay;
      if (elapsed < 0) { allDone = false; return; }
      const raw = Math.min(elapsed / p.duration, 1);
      if (raw < 1) allDone = false;
      const t = easeOut(raw);
      const x = p.sx + (p.tx - p.sx) * t;
      const arc = Math.sin(Math.PI * raw) * -60;
      const y = p.sy + (p.ty - p.sy) * t + arc;
      const size = 10 + Math.sin(Math.PI * raw) * 4;
      const alpha = raw > 0.85 ? Math.max(0, (1 - raw) / 0.15) : 1;

      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.dark;
      ctx.beginPath();
      const r = 3;
      const x0 = x - size/2, y0 = y - size/2;
      ctx.moveTo(x0 + r, y0);
      ctx.lineTo(x0 + size - r, y0);
      ctx.arcTo(x0 + size, y0, x0 + size, y0 + r, r);
      ctx.lineTo(x0 + size, y0 + size - r);
      ctx.arcTo(x0 + size, y0 + size, x0 + size - r, y0 + size, r);
      ctx.lineTo(x0 + r, y0 + size);
      ctx.arcTo(x0, y0 + size, x0, y0 + size - r, r);
      ctx.lineTo(x0, y0 + r);
      ctx.arcTo(x0, y0, x0 + r, y0, r);
      ctx.closePath();
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    if (!allDone) {
      animId = requestAnimationFrame(animLoop);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      showResults();
    }
  }

  animId = requestAnimationFrame(animLoop);
}

function showResults() {
  const counts = [0,1,2].map(() => new Array(6).fill(0));
  for (let c = 0; c < 6; c++) {
    for (let i = 0; i < 10; i++) {
      counts[getAssignment(currentScenario, c, i)][c]++;
    }
  }

  for (let cli = 0; cli < 3; cli++) {
    const box = document.getElementById(`client-${cli}`);
    const total = counts[cli].reduce((a, b) => a + b, 0);

    let html = `
      <div class="client-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Client ${cli+1}
        <span class="client-badge" style="background:#0c2240;color:#60a5fa;">${total} images</span>
      </div>`;

    for (let c = 0; c < 6; c++) {
      const count = counts[cli][c];
      const pct = Math.round((count / 10) * 100);
      html += `
        <div class="bar-row">
          <div class="bar-label" style="background:${COLORS[c]}"></div>
          <div class="bar-track">
            <div class="bar-fill" id="bar-${cli}-${c}" style="background:${COLORS[c]};width:0%"></div>
          </div>
          <span class="bar-count">${count}/10</span>
        </div>`;
    }

    html += `<div class="mini-tiles">`;
    let tileDelay = 0;
    for (let c = 0; c < 6; c++) {
      for (let t = 0; t < counts[cli][c]; t++) {
        html += `<div class="mini-tile" style="background:${COLORS[c]};animation-delay:${tileDelay * 18}ms"></div>`;
        tileDelay++;
      }
    }
    html += `</div>`;
    html += `<div class="total-count">${total} images received</div>`;

    box.innerHTML = html;
    box.classList.add('highlight');

    setTimeout(() => {
      for (let c = 0; c < 6; c++) {
        const bar = document.getElementById(`bar-${cli}-${c}`);
        if (bar) bar.style.width = Math.round((counts[cli][c] / 10) * 100) + '%';
      }
    }, 60);
  }

  document.getElementById('status').textContent = '✓ complete';
  document.getElementById('status').style.color = '#22d3ee';
  document.getElementById('play-btn').disabled = false;
  document.getElementById('play-btn').textContent = 'Redistribute ↓';
  animating = false;
}

initPool();
initLegend();
initClients();
setScenario(1);
</script>
</body>
</html>
